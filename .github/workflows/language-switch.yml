name: Switch README Language

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Idioma / Language'
        required: true
        type: choice
        options:
          - pt
          - en

jobs:
  switch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Switch language
        run: cp README.${{ github.event.inputs.language }}.md README.md

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: switch README to ${{ github.event.inputs.language }}"
          git push
